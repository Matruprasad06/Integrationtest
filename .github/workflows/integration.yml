name: Integration Test

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20   # 🔥 change from 24 → 20 (stable)

      - name: Install Dependencies
        run: npm install

      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 -U testuser && break
            echo "Waiting for postgres..."
            sleep 5
          done

      - name: Run DB Connection Test
        env:
          PGHOST: localhost
          PGUSER: testuser
          PGPASSWORD: testpass
          PGDATABASE: testdb
          PGPORT: 5432
        run: npm run test-db